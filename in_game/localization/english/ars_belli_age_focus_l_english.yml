l_english:
 ars_belli_age_focus.1.title:0 "A New Age Demands a New Focus"
 ars_belli_age_focus.1.desc:0 "Beyond our court's chosen disposition, the times call us to commit our realm to two broader courses. Which shall guide our age first?"
 ars_belli_age_focus.1.a:0 "Expansion"
 ars_belli_age_focus.1.b:0 "Commerce"
 ars_belli_age_focus.1.c:0 "Warfare"
 ars_belli_age_focus.2.title:0 "And the Second Course?"
 ars_belli_age_focus.2.desc:0 "One focus alone is too narrow for the age before us. Choose a second commitment to stand beside the first."
